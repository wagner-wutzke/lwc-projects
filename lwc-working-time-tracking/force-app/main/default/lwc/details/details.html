<template>
    <lightning-card title="Details">
        <div class="slds-var-m-around_small">
            <template if:true={selectedRecord}>
                <lightning-datatable key-field="id" data={selectedRecord} columns={columns} hide-checkbox-column>
                </lightning-datatable>
            </template>
            <template if:false={selectedRecord}>
                <p>No summary data available.</p>
            </template>
        </div>
    </lightning-card>
</template>
